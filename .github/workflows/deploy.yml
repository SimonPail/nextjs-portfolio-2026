name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

      - name: Prepare standalone output
        run: |
          cp -r public .next/standalone/
          cp -r .next/static .next/standalone/.next/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            .next/standalone/ \
            root@${{ secrets.VPS_HOST }}:/root/nextjs-portfolio-2026/

      - name: Create .env and restart
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.VPS_HOST }} << EOF
            export NVM_DIR="/root/.nvm"
            source "\$NVM_DIR/nvm.sh"
            cd /root/nextjs-portfolio-2026
            echo "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" > .env
            pm2 restart portfolio-2026 || pm2 start server.js --name "portfolio-2026"
            pm2 save
          EOF