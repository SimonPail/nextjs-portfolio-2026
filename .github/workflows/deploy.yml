name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            export NVM_DIR="/root/.nvm"
            source "$NVM_DIR/nvm.sh"

            cd /root/nextjs-portfolio-2026

            git pull origin main

            npm install
            npm run build

            pm2 restart portfolio-2026 || pm2 start npm --name "portfolio-2026" -- start
            pm2 save
